
# ─────────────────────────────────────────────────────────────────────────────
# Shared volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  vector_store:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../data/vector_store
  experiences:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../data
  lora_checkpoints:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../data/lora_checkpoints

# ─────────────────────────────────────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────────────────────────────────────
networks:
  idledev:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Local vLLM servers ───────────────────────────────────────────────────

  vllm-deepseek:
    image: vllm/vllm-openai:v0.7.3
    runtime: nvidia
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: >
      --model deepseek-ai/deepseek-coder-6.7b-instruct
      --enable-lora
      --max-lora-rank 64
      --port 8000
      --host 0.0.0.0
      --quantization fp8
      --max-model-len 4096
      --gpu-memory-utilization 0.45
      --tokenizer-mode slow
      --lora-modules coding_lora=/lora_checkpoints/coding_lora debugging_lora=/lora_checkpoints/debugging_lora review_lora=/lora_checkpoints/review_lora
    volumes:
      # Base model weights — pre-downloaded on host at HF_CACHE_DIR
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      # LoRA adapters — written by Training Service, mounted read-only here
      - ../data/lora_checkpoints:/lora_checkpoints:ro
    ports:
      - "8000:8000"
    networks:
      - idledev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  vllm-mistral:
    image: vllm/vllm-openai:v0.7.3
    runtime: nvidia
    depends_on:
      vllm-deepseek:
        condition: service_healthy
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: >
      --model mistralai/Mistral-7B-Instruct-v0.1
      --enable-lora
      --max-lora-rank 64
      --port 8001
      --host 0.0.0.0
      --quantization fp8
      --max-model-len 4096
      --gpu-memory-utilization 0.40
      --lora-modules planning_lora=/lora_checkpoints/planning_lora research_lora=/lora_checkpoints/research_lora criticism_lora=/lora_checkpoints/criticism_lora
    volumes:
      # Base model weights — pre-downloaded on host at HF_CACHE_DIR
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      # LoRA adapters — written by Training Service, mounted read-only here
      - ../data/lora_checkpoints:/lora_checkpoints:ro
    ports:
      - "8001:8001"
    networks:
      - idledev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── Inference Service ──────────────────────────────────────────────────────

  inference:
    build:
      context: ..
      dockerfile: inference/Dockerfile
    env_file: ../.env
    environment:
      - INFERENCE__DEEPSEEK_URL=http://vllm-deepseek:8000
      - INFERENCE__MISTRAL_URL=http://vllm-mistral:8001
      - INFERENCE__GRPC_PORT=50051
      # Backend selection (default: local_vllm for both families).
      # To route a family to a remote vLLM server, set e.g.:
      #   INFERENCE__MISTRAL_BACKEND=remote_vllm
      #   INFERENCE__MISTRAL_URL=https://my-server.example.com:8000
      #   INFERENCE__MISTRAL_AUTH_TOKEN=<optional bearer token>
    networks:
      - idledev
    ports:
      - "8010:8010"
      - "50051:50051"   # gRPC — internal + host-accessible for direct client access
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Optional: standalone ChromaDB server ─────────────────────────────────
  #
  # By default Orchestration uses a local PersistentClient writing to
  # /data/vector_store (inside the experiences volume) — no separate service
  # required.
  #
  # To switch to a standalone ChromaDB server:
  #   1. Uncomment the chromadb service below.
  #   2. Add  ORCHESTRATION__CHROMADB_HOST=chromadb  to the orchestration
  #      environment section (also uncomment that line there).
  #   3. Remove the vector_store volume mount from orchestration (optional —
  #      it is unused in server mode but harmless if left).
  #
  # chromadb:
  #   image: chromadb/chroma:latest
  #   volumes:
  #     - vector_store:/chroma/chroma
  #   environment:
  #     - IS_PERSISTENT=TRUE
  #     - ANONYMIZED_TELEMETRY=FALSE
  #   networks:
  #     - idledev
  #   ports:
  #     - "8020:8000"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Redis (session history store) ─────────────────────────────────────────

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    networks:
      - idledev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Training Service ─────────────────────────────────────────────────────

  training:
    build:
      context: ..
      dockerfile: training/Dockerfile
    env_file: ../.env
    runtime: nvidia          # GPU access for LoRA fine-tuning subprocess
    volumes:
      - experiences:/data
      - lora_checkpoints:/data/lora_checkpoints
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - TRAINING__JSONL_PATH=/data/experiences.jsonl
      - TRAINING__OUTPUT_DIR=/data/lora_checkpoints
      - TRAINING__HF_TOKEN=${HF_TOKEN:-}
      # Without these flags the Hugging Face client checks for model updates on
      # every load, adding latency and failing hard in air-gapped environments.
      # Models are already downloaded to the HF cache volume at first startup;
      # disabling the update check prevents unnecessary network calls during training.
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    networks:
      - idledev
    ports:
      - "8013:8013"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8013/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Orchestration Service ──────────────────────────────────────────────────
  #
  # Context enrichment (few-shot RAG + repo scan) and experience recording
  # now run as in-process async tasks — no separate context or experience
  # containers are required.
  #
  # ChromaDB: by default uses local PersistentClient at /data/vector_store
  # (within the experiences volume).  Uncomment CHROMADB_HOST to switch to
  # the standalone chromadb service defined above.

  orchestration:
    build:
      context: ..
      dockerfile: orchestration/Dockerfile
    env_file: ../.env
    volumes:
      - experiences:/data        # JSONL at /data/experiences.jsonl + vector_store at /data/vector_store
    environment:
      - ORCHESTRATION__INFERENCE_URL=http://inference:8010
      - ORCHESTRATION__DEFAULT_MAX_ITERATIONS=${ORCHESTRATION__DEFAULT_MAX_ITERATIONS:-2}
      - ORCHESTRATION__CONVERGENCE_THRESHOLD=${ORCHESTRATION__CONVERGENCE_THRESHOLD:-0.65}
      - ORCHESTRATION__INFERENCE_USE_GRPC=true
      - ORCHESTRATION__INFERENCE_GRPC_HOST=inference
      - ORCHESTRATION__INFERENCE_GRPC_PORT=50051
      - ORCHESTRATION__JSONL_PATH=/data/experiences.jsonl
      - ORCHESTRATION__CHROMADB_PATH=/data/vector_store
      - ORCHESTRATION__TRAINING_URL=http://training:8013
      # Uncomment to switch ChromaDB to server mode (also uncomment chromadb service above):
      # - ORCHESTRATION__CHROMADB_HOST=chromadb
      # - ORCHESTRATION__CHROMADB_PORT=8000
    networks:
      - idledev
    ports:
      - "8014:8001"
    depends_on:
      inference:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Gateway Service ────────────────────────────────────────────────────────

  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    env_file: ../.env
    environment:
      - GATEWAY__ORCHESTRATION_URL=http://orchestration:8001
      - GATEWAY__API_KEY=${GATEWAY_API_KEY:-}
    networks:
      - idledev
    ports:
      - "8080:8080"
    depends_on:
      orchestration:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
