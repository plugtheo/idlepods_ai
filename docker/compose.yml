
# ─────────────────────────────────────────────────────────────────────────────
# Shared volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  vector_store:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../data/vector_store
  experiences:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../data
  lora_checkpoints:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../data/lora_checkpoints
  redis_data:

# ─────────────────────────────────────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────────────────────────────────────
networks:
  idledev:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Local vLLM servers ───────────────────────────────────────────────────

  vllm-primary:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=True
    command: >
      --model ${VLLM_MODEL_ID:-Qwen/Qwen3-8B-AWQ}
      --quantization awq_marlin
      --enable-lora
      --max-lora-rank 64
      --max-loras 8
      --port 8000
      --host 0.0.0.0
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --gpu-memory-utilization 0.92
      --max-model-len ${VLLM_MAX_MODEL_LEN:-40960}
      --kv-cache-dtype fp8
      --max-num-seqs 1
      --tokenizer-mode auto
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      # LoRA adapters — written by Training Service; read by vLLM at runtime load
      - ../data/lora_checkpoints:/lora_checkpoints
    ports:
      - "8000:8000"
    networks:
      - idledev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── Inference Service ──────────────────────────────────────────────────────

  inference:
    build:
      context: ..
      dockerfile: inference/Dockerfile
    env_file: ../.env
    environment:
      - INFERENCE__GRPC_PORT=50051
      - MODELS_YAML_PATH=/config/models.yaml
      - RECIPES_YAML_PATH=/config/recipes.yaml
    networks:
      - idledev
    ports:
      - "8010:8010"
      - "50051:50051"   # gRPC — internal + host-accessible for direct client access
    depends_on:
      vllm-primary:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../models.yaml:/config/models.yaml:ro
      - ../recipes.yaml:/config/recipes.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Optional: standalone ChromaDB server ─────────────────────────────────
  #
  # By default Orchestration uses a local PersistentClient writing to
  # /data/vector_store (inside the experiences volume) — no separate service
  # required.
  #
  # To switch to a standalone ChromaDB server:
  #   1. Uncomment the chromadb service below.
  #   2. Add  ORCHESTRATION__CHROMADB_HOST=chromadb  to the orchestration
  #      environment section (also uncomment that line there).
  #   3. Remove the vector_store volume mount from orchestration (optional —
  #      it is unused in server mode but harmless if left).
  #
  # chromadb:
  #   image: chromadb/chroma:latest
  #   volumes:
  #     - vector_store:/chroma/chroma
  #   environment:
  #     - IS_PERSISTENT=TRUE
  #     - ANONYMIZED_TELEMETRY=FALSE
  #   networks:
  #     - idledev
  #   ports:
  #     - "8020:8000"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Redis (session history store) ─────────────────────────────────────────

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - idledev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Training (one-shot job, cron-triggered by training-scheduler) ────────
  #
  # Profile-gated: only runs when invoked via `docker compose run --rm training`.
  # The wrapper acquires a file-lock at /data/training.lock, optionally stops
  # vLLM (BLOCK mode), runs trainer_entry per capability, then restarts vLLM.

  training:
    profiles: ["training"]
    build:
      context: ..
      dockerfile: training/Dockerfile
    env_file: ../.env
    runtime: nvidia
    volumes:
      - experiences:/data
      - lora_checkpoints:/data/lora_checkpoints
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      - /var/run/docker.sock:/var/run/docker.sock
      - ./compose.yml:/compose/compose.yml:ro
      - ../models.yaml:/config/models.yaml:ro
      - ../recipes.yaml:/config/recipes.yaml:ro
    environment:
      - TRAINING__JSONL_PATH=/data/experiences.jsonl
      - TRAINING__OUTPUT_DIR=/data/lora_checkpoints
      - TRAINING__HF_TOKEN=${HF_TOKEN:-}
      - TRAINING__TRAINING_TARGET=${TRAINING_TARGET:-local}
      - TRAINING__TRAINING_TRIGGER_URL=${TRAINING_TRIGGER_URL:-}
      - TRAINING__TRAINING_EXCLUSIVE_MODE=${TRAINING_EXCLUSIVE_MODE:-BLOCK}
      - TRAINING__LOCK_PATH=/data/training.lock
      - TRAINING__COMPOSE_FILE=/compose/compose.yml
      - TRAINING__INFERENCE_URL=http://inference:8010
      - MODELS_YAML_PATH=/config/models.yaml
      - RECIPES_YAML_PATH=/config/recipes.yaml
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    networks:
      - idledev

  # ── Training Scheduler (lightweight interval cron) ───────────────────────

  training-scheduler:
    build:
      context: ..
      dockerfile: training/scheduler/Dockerfile
    env_file: ../.env
    volumes:
      - experiences:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./compose.yml:/compose/compose.yml:ro
    environment:
      - TRAINING__JSONL_PATH=/data/experiences.jsonl
      - TRAINING__SCHEDULER_INTERVAL_HOURS=${SCHEDULER_INTERVAL_HOURS:-4}
      - TRAINING__LOCK_PATH=/data/training.lock
      - TRAINING__COMPOSE_FILE=/compose/compose.yml
      - COMPOSE_FILE=/compose/compose.yml
    networks:
      - idledev
    restart: unless-stopped

  # ── Orchestration Service ──────────────────────────────────────────────────
  #
  # Context enrichment (few-shot RAG + repo scan) and experience recording
  # now run as in-process async tasks — no separate context or experience
  # containers are required.
  #
  # ChromaDB: by default uses local PersistentClient at /data/vector_store
  # (within the experiences volume).  Uncomment CHROMADB_HOST to switch to
  # the standalone chromadb service defined above.

  orchestration:
    build:
      context: ..
      dockerfile: orchestration/Dockerfile
    env_file: ../.env
    volumes:
      - experiences:/data        # JSONL at /data/experiences.jsonl + vector_store at /data/vector_store
      - ../models.yaml:/config/models.yaml:ro
      - ../recipes.yaml:/config/recipes.yaml:ro
    environment:
      - ORCHESTRATION__INFERENCE_URL=http://inference:8010
      - ORCHESTRATION__DEFAULT_MAX_ITERATIONS=${ORCHESTRATION__DEFAULT_MAX_ITERATIONS:-2}
      - ORCHESTRATION__CONVERGENCE_THRESHOLD=${ORCHESTRATION__CONVERGENCE_THRESHOLD:-0.85}
      - ORCHESTRATION__INFERENCE_USE_GRPC=true
      - ORCHESTRATION__INFERENCE_GRPC_HOST=inference
      - ORCHESTRATION__INFERENCE_GRPC_PORT=50051
      - ORCHESTRATION__JSONL_PATH=/data/experiences.jsonl
      - ORCHESTRATION__CHROMADB_PATH=/data/vector_store
      - ORCHESTRATION__MODEL_CONTEXT_LEN=${VLLM_MAX_MODEL_LEN:-40960}
      - MODELS_YAML_PATH=/config/models.yaml
      - RECIPES_YAML_PATH=/config/recipes.yaml
      # Uncomment to switch ChromaDB to server mode (also uncomment chromadb service above):
      # - ORCHESTRATION__CHROMADB_HOST=chromadb
      # - ORCHESTRATION__CHROMADB_PORT=8000
    networks:
      - idledev
    ports:
      - "8014:8001"
    depends_on:
      inference:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Gateway Service ────────────────────────────────────────────────────────

  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    env_file: ../.env
    environment:
      - GATEWAY__ORCHESTRATION_URL=http://orchestration:8001
      - GATEWAY__API_KEY=${GATEWAY_API_KEY:-}
    networks:
      - idledev
    ports:
      - "8080:8080"
    depends_on:
      orchestration:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
