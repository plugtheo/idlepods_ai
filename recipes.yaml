default:
  peft_type: rslora
  use_rslora: true
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  learning_rate: 2e-4
  num_epochs: 3
  max_seq_length: 2048
  sft_format: openai_messages
  tool_call_style: openai_native

by_role:
  coder:    {r: 32, alpha: 64, num_epochs: 4}
  debugger: {r: 32, alpha: 64, num_epochs: 4}
  consensus: {peft_type: none}

# Per-backend role overrides: future model-specific tuning goes here.
# Key format: "backend_name:role_name"
# Example:
# by_backend_role:
#   "primary:coder": {peft_type: rslora, use_rslora: true, r: 48, alpha: 96}
