default:
  peft_type: rslora
  use_rslora: true
  r: 32
  alpha: 64
  dropout: 0.0
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  # 2e-4 caused gradient explosions (grad_norm >200) on the 15k-sample coder
  # run, with loss plateauing in 0.6-0.8 instead of converging. 1e-4 is the
  # conservative-safe value for rsLora rank=32 on Qwen3-8B; raise only after
  # a clean run completes with grad_norm consistently < 5.
  learning_rate: 1e-4
  num_epochs: 3
  # 8192 covers all current curated records (p99 ~1.2k tokens) with
  # ample headroom for multi-turn experience records captured during
  # online retraining. Larger values reserve unused VRAM and slow
  # padding-free packing on heterogeneous batches without quality gain.
  max_seq_length: 8192
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  packing: true
  load_in_4bit: true
  sft_format: openai_messages
  tool_call_style: openai_native
  resume_from_prev_adapter: true

by_role:
  coder:    {r: 32, alpha: 64, num_epochs: 3, dropout: 0.05}
  debugger: {r: 32, alpha: 64, num_epochs: 3, dropout: 0.05}
  consensus: {peft_type: none}

# Per-backend role overrides: future model-specific tuning goes here.
# Key format: "backend_name:role_name"
# Example:
# by_backend_role:
#   "primary:coder": {peft_type: rslora, use_rslora: true, r: 48, alpha: 96}

# ── Onboarding a new agent role Example ──────────────────────────────────────────────
#
# Four steps to add a new role (e.g. "summarizer"):
#
# (a) Add a system prompt entry in shared/contracts/agent_prompts.py:
#         AGENT_PROMPTS["summarizer"] = "You are a summarisation expert..."
#
# (b) Add entries in training/app/trainer_entry.py:
#         _CAPABILITY_TO_CURATED["summarizer"] = "summarizer_curated.jsonl"
#         _CAPABILITY_TO_ADAPTER["summarizer"] = "summarizer_lora"
#
# (c) Add a by_role override here if the default rsLoRA recipe needs adjustment:
#         by_role:
#           summarizer: {r: 16, alpha: 32}
#     Omit the entry to inherit the default (peft_type: rslora, r: 32, alpha: 64).
#
# (d) Optionally enable tool calling for the new role by adding tool names to
#         orchestration/app/config/settings.py → role_tools_enabled["summarizer"]
#     No graph or pipeline change is required — tools are dispatched by config.
#
# Notes:
#   - peft_type: none is RESERVED for the "consensus" role (final synthesiser,
#     no LoRA adapter — it always runs on the base model).
#   - The PEFT-type gate in trainer_entry.py will reject any non-consensus role
#     whose peft_type is not in {lora, rslora, dora, qlora}.
#   - Switching between rsLoRA, DoRA, or QLoRA is a YAML edit only — no code change.
# ─────────────────────────────────────────────────────────────────────────────
